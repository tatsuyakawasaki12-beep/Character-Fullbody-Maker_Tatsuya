<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Character Fullbody Maker — Tatsuya Edition Ver.2.0 Beta 17.1</title>
<style>
:root{--bg:#f4f7fb;--panel:#fff;--text:#182235;--muted:#718096;--line:#d9e2ef;--accent:#3563e9;--soft:#eef3ff;--danger:#b42318;--safe:#16794f;--safe-bg:#eefbf4}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
button,input,select,textarea{font:inherit}
header{background:#fff;border-bottom:1px solid var(--line);padding:18px 16px}
.wrap,main{max-width:980px;margin:auto}
h1{margin:0;font-size:22px;line-height:1.3}.sub{margin-top:6px;color:var(--muted);font-size:13px}
main{padding:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 4px 18px rgba(15,23,42,.035);margin-bottom:16px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}
button,.filelabel{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.danger{color:var(--danger)}
.name{font-size:24px;font-weight:900}.status{font-size:13px;color:var(--muted);margin-top:4px}
.progress{height:10px;background:#e8eef7;border-radius:999px;overflow:hidden;margin-top:15px}.progress span{display:block;height:100%;background:var(--accent);transition:.2s}
.steps{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
.step{border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center;font-size:12px;background:#fff;cursor:pointer}
.step.active{border-color:var(--accent);background:var(--soft);font-weight:900}
.step.done{background:#f6f9ff}
.controls,.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.controls{grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:16px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text)}
textarea{min-height:90px;resize:vertical}.wide{grid-column:1/-1}
.section-title{font-size:22px;font-weight:900;margin:0 0 4px}.lead{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.55}
.standard,.detail{display:none}
body.level-standard .standard{display:block}
body.level-detail .standard,body.level-detail .detail{display:block}
.note{background:var(--soft);border-radius:12px;padding:12px;font-size:13px;line-height:1.6;margin-top:14px}
.actions{display:flex;justify-content:space-between;gap:10px;margin-top:18px}
.output{min-height:320px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.55}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;place-items:center;padding:16px;z-index:50}
.modal.show{display:grid}.modalbox{background:#fff;border-radius:18px;padding:18px;max-width:620px;width:100%;max-height:82vh;overflow:auto}
.list{display:grid;gap:10px;margin-top:12px}.item{border:1px solid var(--line);border-radius:12px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.itemname{font-weight:900}.meta{font-size:12px;color:var(--muted);margin-top:3px}
.assist-grid{display:grid;gap:10px}.checklist{display:grid;gap:8px;margin-top:12px}.checkitem{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.checkitem.warn{border-color:#f0b429;background:#fffaf0}.checkitem.ok{border-color:#12b76a;background:#f0fff7}.mini{font-size:12px;color:var(--muted)}.assist-item{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}.assist-item b{display:block;margin-bottom:4px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#182235;color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:750;opacity:0;pointer-events:none;transition:.22s;z-index:80;max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.safe-banner{display:none;margin:10px 0;padding:12px 14px;border-radius:12px;background:var(--safe-bg);color:var(--safe);font-weight:900;border:1px solid #9fdec0}.safe-active .safe-banner{display:block}.safe-active #promptStatus{background:var(--safe-bg);color:var(--safe);border:1px solid #9fdec0;font-weight:900}.safe-active #saferRetryBtn{background:var(--safe);color:#fff;border-color:var(--safe)}.safe-active #step10Panel{background:linear-gradient(180deg,#fff 0%,var(--safe-bg) 100%)}.conditional-hidden{display:none!important}
@media(max-width:720px){.controls,.grid{grid-template-columns:1fr}.wide{grid-column:auto}.steps{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body class="level-easy">
<header><div class="wrap">
<h1>Character Fullbody Maker — Tatsuya Edition Ver.2.0</h1>
<div class="sub">開発版 Beta 17.1：下腹部体毛3段階指定・脚毛4部位指定・見切れ防止強化・顔一貫性</div>
</div></header>

<main>
<section class="card">
<div class="toolbar">
<button id="newBtn">新規</button>
<button id="saveBtn" class="primary">下書き保存</button>
<button id="libraryBtn">ライブラリ</button><button id="assistBtn">AIアシスト</button><button id="checkBtn">整合性チェック</button>
<button id="jsonExportBtn">JSON書出</button>
<label class="filelabel">JSON読込<input id="jsonFile" type="file" accept=".json" hidden></label>
</div>
</section>

<section class="card">
<div id="displayName" class="name">名称未設定</div>
<div id="displayStatus" class="status">未保存</div>
<div class="progress"><span id="progressBar"></span></div>
<div class="steps" id="steps"></div>
</section>

<section class="card">
<div class="controls">
<div><label>設定レベル</label><select id="settingLevel"><option value="easy">かんたん</option><option value="standard">標準</option><option value="detail">詳細</option></select></div>
<div><label>変更方式</label><select id="changeMode"><option value="confirm">関連変更を確認してから適用</option><option value="natural">全体の整合性を保って自動調整</option><option value="only">指定箇所だけ変更</option></select></div>
<div><label>保存状態</label><select id="projectStatus"><option>作成途中</option><option>完成</option><option>派生版</option></select></div>
</div>
<div id="page"></div>
</section>
</main>

<div id="libraryModal" class="modal"><div class="modalbox">
<h3 style="margin-top:0">キャラクターライブラリ</h3>
<div class="lead">Chrome内の、このサイト専用領域に保存されています。</div>
<div id="libraryList" class="list"></div>
<div class="actions"><span></span><button id="libraryClose">閉じる</button></div>
</div></div>



<div id="checkModal" class="modal"><div class="modalbox">
<h3 style="margin-top:0">整合性チェック</h3>
<div class="lead">設定の矛盾や、生成時に不自然になりやすい組み合わせを確認します。</div>
<div id="checkList" class="checklist"></div>
<div class="actions"><span></span><button id="checkClose" class="primary">閉じる</button></div>
</div></div>

<div id="assistModal" class="modal"><div class="modalbox">
<h3 style="margin-top:0">AIアシスト</h3>
<div class="lead">年齢・身長・体重・体型プリセットから、関連項目の候補を提案します。</div>
<div class="grid">
<div><label>調整強度</label><select id="assistStrength"><option>控えめ</option><option selected>自然</option><option>しっかり</option></select></div>
<div><label>体重調整</label><select id="assistAdjustWeight"><option>提案しない</option><option selected>提案のみ</option><option>体型に合わせて調整</option></select></div>
<div class="wide"><label>体型以外の固定</label><select id="assistLockNonBody"><option selected>固定する</option><option>必要に応じて変更を許可</option></select></div>
</div>
<div id="assistSummary" class="assist-grid" style="margin-top:14px"></div>
<div class="actions"><button id="assistClose">閉じる</button><button id="assistApply" class="primary">提案を適用</button></div>
</div></div>

<div id="toast" class="toast"></div>

<script>

};
const initial=JSON.parse(JSON.stringify(state));
const stepNames=["基本情報","顔","髪","肌","身体","体毛","衣装","ポーズ","背景","完成"];

function $(id){return document.getElementById(id)}
function showToast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200)}
function options(arr,val){return arr.map(x=>`<option ${x===val?"selected":""}>${x}</option>`).join("")}
function field(id,label,arr,cls=""){return `<div class="${cls}"><label>${label}</label><select id="${id}">${options(arr,state[id])}</select></div>`}
function inputField(id,label,cls=""){return `<div class="${cls}"><label>${label}</label><input id="${id}" value="${state[id]||""}"></div>`}
function textareaField(id,label,ph="",cls="wide"){return `<div class="${cls}"><label>${label}</label><textarea id="${id}" placeholder="${ph}">${state[id]||""}</textarea></div>`}
function navButtons(){
 return `<div class="actions">
 <button id="prevBtn" ${currentStep===1?"disabled style='opacity:.45'":""}>◀ 前へ</button>
 <button id="nextBtn" class="primary">${currentStep===10?"プロンプト更新":"次へ ▶"}</button>
 </div>`;
}
function renderSteps(){
 $("steps").innerHTML=stepNames.map((n,i)=>{
   const s=i+1,cls=s===currentStep?"active":s<currentStep?"done":"";
   return `<button class="step ${cls}" data-step="${s}">${s} ${n}</button>`;
 }).join("");
 $("steps").querySelectorAll("[data-step]").forEach(b=>b.addEventListener("click",()=>{
   savePageToState();currentStep=Number(b.dataset.step);render();window.scrollTo({top:0,behavior:"smooth"});
 }));
}

function applyConditionalUI(){
 const hide=(id,yes)=>{const e=$(id);if(e&&e.parentElement)e.parentElement.classList.toggle("conditional-hidden",!!yes)};
 const noTop=state.top==="上半身裸";
 ["topColor","topFit","topLength","topHem","topArmhole"].forEach(id=>hide(id,noTop));
 const tank=/タンクトップ|ノースリーブ/.test(state.top); hide("topArmhole",noTop||!tank);
 const noInfo=state.infoDisplay==="表示しない"; ["infoLayout","infoPlacement","infoLanguage","nameDisplayRule","showTraits","showHair","showEyes","showOutfit","showPose","showNotes","showProject","projectName","showVersion","sheetVersion","showSheetNo","sheetNo","showCreator","creatorName"].forEach(id=>hide(id,noInfo));
 const p=$("step10Panel"); if(p)p.classList.toggle("safe-active",state.safeRetryLevel==="安全表現");
 const b=$("saferRetryBtn"); if(b)b.textContent=state.safeRetryLevel==="安全表現"?"✓ 安全表現で再生成済み":"安全表現で再生成";
}

function bindPage(){
 document.querySelectorAll("#page input,#page select,#page textarea").forEach(el=>{
   if(el.id==="output")return;
   el.addEventListener("input",()=>{
     state[el.id]=el.value;refreshHeader();applyConditionalUI();
     if(currentStep===7 && el.id==="top"){savePageToState();render();return;}
     if(currentStep===9 && el.id==="infoDisplay"){savePageToState();render();return;}
     if(currentStep===10)generatePrompt();
   });
 });
 if($("prevBtn"))$("prevBtn").addEventListener("click",()=>{savePageToState();if(currentStep>1){currentStep--;render();window.scrollTo({top:0,behavior:"smooth"})}});
 if($("nextBtn"))$("nextBtn").addEventListener("click",()=>{savePageToState();if(currentStep<10){currentStep++;render();window.scrollTo({top:0,behavior:"smooth"})}else generatePrompt()});
 if($("saferRetryBtn"))$("saferRetryBtn").addEventListener("click",()=>{
   savePageToState();
   state.safeRetryLevel="安全表現";
   generatePrompt();
   showToast("より中立的な構造設計表現で再生成しました。");
 });
 if($("normalPromptBtn"))$("normalPromptBtn").addEventListener("click",()=>{
   savePageToState();
   state.safeRetryLevel="通常";
   generatePrompt();
   showToast("通常の変換表現へ戻しました。");
 });
 if($("copyBtn"))$("copyBtn").addEventListener("click",async()=>{
   savePageToState();
   generatePrompt();
   const latestText=$("output").value;
   try{
     await navigator.clipboard.writeText(latestText);
     showToast("現在の設定から再生成した最新プロンプトをコピーしました。");
   }catch(e){
     $("output").focus();
     $("output").select();
     document.execCommand("copy");
     showToast("最新プロンプトをコピーしました。");
   }
 });
}
function savePageToState(){document.querySelectorAll("#page input,#page select,#page textarea").forEach(el=>{if(el.id!=="output")state[el.id]=el.value})}
function refreshHeader(){$("displayName").textContent=state.name.trim()||"名称未設定"}
function render(){
 document.body.className="level-"+$("settingLevel").value;
 $("progressBar").style.width=(currentStep*10)+"%";
 renderSteps();
 $("page").innerHTML=pageHtml();
 bindPage();refreshHeader();
 if(currentStep===10)generatePrompt();
}

function parseNumber(value, fallback=0){
 const n=parseFloat(String(value??"").replace(/[^\d.]/g,""));
 return Number.isFinite(n)?n:fallback;
}
function bodyMassIndex(){
 const h=parseNumber(state.height,180)/100,w=parseNumber(state.weight,70);
 return h>0?w/(h*h):0;
}
function bmiAssessment(bmi){
 if(bmi<13)return {level:"critical",label:"極端な低体重",text:"設定上、非常に低い体重です。意図的な設定か確認してください。"};
 if(bmi<16)return {level:"warn",label:"著しい低体重",text:"身長に対して体重がかなり低い設定です。"};
 if(bmi<18.5)return {level:"warn",label:"低体重",text:"細身の設定です。"};
 if(bmi<25)return {level:"ok",label:"標準範囲",text:"身長と体重の組み合わせは一般的な範囲です。"};
 if(bmi<30)return {level:"warn",label:"高め",text:"体重がやや高い設定です。体型指定との整合性を確認してください。"};
 if(bmi<35)return {level:"warn",label:"かなり高め",text:"身長に対して体重がかなり高い設定です。"};
 return {level:"critical",label:"極端に高い",text:"非常に高い体重設定です。意図的な設定か確認してください。"};
}
function suggestedWeightRange(){
 const h=parseNumber(state.height,180)/100;
 return {low:Math.round(18.5*h*h),mid:Math.round(22*h*h),high:Math.round(24.9*h*h)};
}
function promptProfile(){
 return {
   ai:state.targetAI,
   sensitivity:state.promptSensitivity||"バランス",
   retry:(typeof effectiveCompileProfile==="function"?effectiveCompileProfile().expression:(state.safeRetryLevel||"通常"))
 };
}
function structuralTerm(level, safety, balanced, precise){
 const p=promptProfile();
 if(p.retry==="安全表現")return safety;
 if(p.sensitivity==="安全優先")return safety;
 if(p.sensitivity==="形状再現優先")return precise;
 return balanced;
}

 if($("promptStatus"))$("promptStatus").textContent=state.safeRetryLevel==="安全表現"?"✓ 安全表現で再生成済み":"通常表現"; applyConditionalUI();
}
function safeGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function safeSet(k,v){try{localStorage.setItem(k,v);return true}catch(e){return false}}
function getLibrary(){try{return JSON.parse(safeGet(STORAGE_LIBRARY)||"[]")}catch(e){return []}}
function setLibrary(x){safeSet(STORAGE_LIBRARY,JSON.stringify(x))}
function collectAll(){savePageToState();state.settingLevel=$("settingLevel").value;state.changeMode=$("changeMode").value;state.projectStatus=$("projectStatus").value;return JSON.parse(JSON.stringify(state))}
function applyAll(o){
 if(o&&o.color&&!o.topColor&&!o.bottomColor){o.topColor=o.color;o.bottomColor=o.color}
 const rename={
  "上半身裸":"上半身裸","白い無地Tシャツ":"Tシャツ(無地)","黒い無地Tシャツ":"Tシャツ(無地)",
  "ボクサーブリーフ":"ボクサーパンツ(ローライズ)","競泳ビキニ":"競泳パンツ(ビキニ)",
  "ローライズビキニ":"ビキニ(ローライズ)","ハイレグビキニ":"ビキニ(ハイレグ)",
  "ビキニ":"ビキニ(スタンダード)","スポーツビキニ":"ビキニ(スポーツ)",
  "越中褌（えっちゅうふんどし）":"ふんどし(越中)","六尺褌（ろくしゃくふんどし）":"ふんどし(六尺)",
  "もっこ褌（もっこふんどし）":"ふんどし(もっこ)","黒猫褌（くろねこふんどし）":"ふんどし(黒猫)",
  "割褌（わりふんどし）":"ふんどし(割)"
 };
 if(o&&rename[o.top])o.top=rename[o.top];
 if(o&&rename[o.bottom])o.bottom=rename[o.bottom];
 if(o&&o.referenceMode==="通常衣装")o.referenceMode="衣装デザイン資料";
 if(o&&o.referenceMode==="人体資料用 Nude Reference")o.referenceMode="人体・衣装構造資料";
 if(o&&o.outputLanguage==="日本語")o.outputLanguage="英語のみ";
 if(o&&o.lowerHairSpread==="標準")o.lowerHairSpread="陰毛周辺にまとまる";
 if(o&&!o.lowerHairStart)o.lowerHairStart="へそから腰骨まではほぼ無し・腰骨ラインから濃くなる";
 if(o&&o.lowerHairStart==="腰骨ライン付近から")o.lowerHairStart="へそから腰骨まではほぼ無し・腰骨ラインから濃くなる";
 if(o&&!o.lowerThighHair)o.lowerThighHair=o.thighHair||"やや濃い";
 if(o&&!o.calfHair)o.calfHair=o.shinHair||"濃い";
 if(o&&!o.legHairDistribution)o.legHairDistribution="脚全体に自然";
 if(o&&!o.kneeHairTransition)o.kneeHairTransition="膝周辺も自然につながる";
 if(o&&!o.framingPriority)o.framingPriority="全身と余白を最優先";
 if(o&&!o.edgeClearance)o.edgeClearance="かなり広い";
 if(o&&!o.lowerHairArea)o.lowerHairArea=o.lowerHairSpread&&o.lowerHairSpread.includes("内もも")?"骨盤側の下腹部・鼠径部・内もも上部":o.lowerHairSpread&&o.lowerHairSpread.includes("鼠径部")?"骨盤側の下腹部・鼠径部まで":"陰毛周辺のみ";
 if(o&&!o.lowerHairFlow)o.lowerHairFlow=o.lowerHairConnection==="境目なく連続して広がる"?"境目なく自然に連続":o.lowerHairConnection||"全体が自然につながる";
 if(o&&!o.bodyPosture)o.bodyPosture=o.pose||"自然な直立";
 if(o&&!o.legWidth)o.legWidth=o.legsPose||"肩幅程度に開く";
 if(o&&!o.legOffset)o.legOffset="左右を揃える";
 if(o&&!o.footDirection)o.footDirection="自然な外向き";
 if(o&&!o.lowerHairConnection)o.lowerHairConnection="全体が自然につながる";
 if(o&&!o.promptSensitivity)o.promptSensitivity="バランス";
 if(o&&!o.safeRetryLevel)o.safeRetryLevel="通常";
 if(o&&!o.promptDetail)o.promptDetail="標準（バランス）";
 if(o&&!o.autoCompile)o.autoCompile="自動（推奨）";
 if(o&&o.bottom==="ボクサーパンツ(ローライズ)"&&!o.bottomRise)o.bottomRise="ローライズ：腰骨・骨盤付近";
 Object.assign(state,o||{});$("settingLevel").value=state.settingLevel||"easy";$("changeMode").value=state.changeMode||"confirm";$("projectStatus").value=state.projectStatus||"作成途中";render()}
function saveDraft(){ if(currentStep===10)generatePrompt();
 const data={id:Date.now(),savedAt:new Date().toISOString(),version:"2.0-beta17.1",currentStep,data:collectAll()};
 safeSet(STORAGE_CURRENT,JSON.stringify(data));
 const lib=getLibrary();const idx=lib.findIndex(x=>x.data&&x.data.name===data.data.name&&x.data.projectStatus===data.data.projectStatus);
 if(idx>=0){data.id=lib[idx].id;lib[idx]=data}else lib.unshift(data);setLibrary(lib.slice(0,50));
 $("displayStatus").textContent="Chrome内に保存済み："+new Date().toLocaleString("ja-JP");showToast("下書きを保存しました。");
}
function loadCurrent(){const raw=safeGet(STORAGE_CURRENT);if(!raw)return;try{const d=JSON.parse(raw);currentStep=d.currentStep||1;applyAll(d.data);$("displayStatus").textContent="保存済みデータを再開"}catch(e){}}
function newProject(){
 if(!confirm("新しいキャラクターを作成しますか？\n現在の未保存入力は消去されますが、ライブラリは残ります。"))return;
 try{localStorage.removeItem(STORAGE_CURRENT)}catch(e){}
 Object.keys(state).forEach(k=>delete state[k]);Object.assign(state,JSON.parse(JSON.stringify(initial)));
 currentStep=1;$("settingLevel").value="easy";$("changeMode").value="confirm";$("projectStatus").value="作成途中";
 $("displayStatus").textContent="未保存・新規作成";render();window.scrollTo({top:0,behavior:"smooth"});showToast("新規作成に切り替えました。");
}
function exportJSON(){ if(currentStep===10)generatePrompt();
 const data={app:"Character Fullbody Maker — Tatsuya Edition",version:"2.0-beta17.1",exportedAt:new Date().toISOString(),currentStep,data:collectAll()};
 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");
 a.href=url;a.download=(state.name.trim()||"character")+"_beta17_1.json";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importJSON(file){const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);currentStep=d.currentStep||1;applyAll(d.data||d);showToast("JSONを読み込みました。")}catch(e){alert("JSONを読み込めませんでした。")}};r.readAsText(file)}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function renderLibrary(){
 const list=getLibrary(),root=$("libraryList");
 if(!list.length){root.innerHTML='<div class="note">保存されたキャラクターはありません。</div>';return}
 root.innerHTML=list.map(x=>`<div class="item"><div><div class="itemname">${escapeHtml(x.data.name||"名称未設定")}</div><div class="meta">${escapeHtml(x.data.projectStatus||"作成途中")}・${new Date(x.savedAt).toLocaleString("ja-JP")}</div></div><div><button data-load="${x.id}">読込</button> <button class="danger" data-delete="${x.id}">削除</button></div></div>`).join("");
 root.querySelectorAll("[data-load]").forEach(b=>b.addEventListener("click",()=>{const x=getLibrary().find(v=>v.id===Number(b.dataset.load));if(!x)return;currentStep=x.currentStep||1;applyAll(x.data);safeSet(STORAGE_CURRENT,JSON.stringify(x));$("libraryModal").classList.remove("show");$("displayStatus").textContent="ライブラリから読込"}));
 root.querySelectorAll("[data-delete]").forEach(b=>b.addEventListener("click",()=>{if(!confirm("削除しますか？"))return;setLibrary(getLibrary().filter(x=>x.id!==Number(b.dataset.delete)));renderLibrary()}));
}

function calcAssist(){
 const h=parseNumber(state.height,180),w=parseNumber(state.weight,70),age=parseNumber(state.age,18);
 const hm=h/100,bmi=hm>0?w/(hm*hm):0,assessment=bmiAssessment(bmi),range=suggestedWeightRange();
 const strength=$("assistStrength")?$("assistStrength").value:(state.assistStrength||"自然");
 const weightMode=$("assistAdjustWeight")?$("assistAdjustWeight").value:(state.assistAdjustWeight||"提案のみ");
 const p=state.preset,s={};
 s.bmiInfo=`BMI ${bmi.toFixed(1)}：${assessment.label}`;
 s.bmiComment=assessment.text;
 s.standardWeightGuide=`一般的な目安 ${range.low}〜${range.high}kg、中央値 約${range.mid}kg`;
 s.shoeSize=(h>=188?"28.0":h>=180?"27.0":h>=170?"26.5":"25.5")+"cm";
 s.inseam=h>=185?(strength==="しっかり"?"長い":"やや長め"):h<=160?"やや短め":"標準";
 s.headRatio=h>=185?(strength==="しっかり"?"モデル体型":"やや高い"):"標準";
 s.chestCirc=(bmi<16?82:bmi<19?86:bmi<22?92:bmi<25?97:bmi<28?102:108)+"cm";
 s.waistCirc=(bmi<16?62:bmi<19?68:bmi<22?72:bmi<25?78:bmi<28?84:92)+"cm";
 s.wrinkles=age<30?"なし":age<45?"ごく少ない":age<60?"少ない":"自然";
 s.spots=age<35?"なし":age<50?"ごく少ない":"少ない";

 let targetBmi=22;
 if(p==="モデル体型")targetBmi=21;
 if(p==="細身")targetBmi=19;
 if(p==="細マッチョ")targetBmi=23;
 if(p==="水泳選手体型")targetBmi=24;
 if(p==="ランナー体型")targetBmi=20;
 if(p==="がっしり体型")targetBmi=27;
 if(p==="自転車競技者体型")targetBmi=22;
 const targetWeight=Math.round(targetBmi*hm*hm);

 if(weightMode==="体型に合わせて調整")s.weight=targetWeight+"kg";
 if(weightMode==="提案のみ")s.weightSuggestion=targetWeight+"kg";
 if(bmi<16||bmi>=35)s.strongWarning="現在の身長・体重は極端な組み合わせです。意図的な設定か確認してください。";
 if(["がっしり体型","細マッチョ","水泳選手体型"].includes(p)&&bmi<18.5)s.bodyMismatch="選択した体型に対して体重が低すぎる可能性があります。";
 if(["細身","モデル体型","ランナー体型"].includes(p)&&bmi>=28)s.bodyMismatch="選択した体型に対して体重が高すぎる可能性があります。";

 if(p==="モデル体型")Object.assign(s,{bodyBuild:"モデル体型",shoulder:strength==="控えめ"?"標準":"やや広め",chest:"標準",abdomen:"平坦",waist:"細い",hip:"引き締まった",arms:"細い",hands:"標準",thighs:"細い",calves:"細い",legs:strength==="しっかり"?"モデル体型の長い脚":"長い"});
 if(p==="細身")Object.assign(s,{bodyBuild:"細身",shoulder:"標準",chest:"薄い",abdomen:"平坦",waist:"細い",hip:"小さめ",arms:"細い",thighs:"細い",calves:"細い"});
 if(p==="細マッチョ")Object.assign(s,{bodyBuild:"細マッチョ",shoulder:"やや広め",chest:strength==="控えめ"?"標準":"ほどよく厚い",abdomen:strength==="しっかり"?"明確な腹筋":"薄く腹筋",waist:"細い",hip:"引き締まった",arms:strength==="控えめ"?"引き締まった":"筋肉質",thighs:"引き締まった",calves:"引き締まった"});
 if(p==="水泳選手体型")Object.assign(s,{bodyBuild:"水泳選手体型",shoulder:strength==="控えめ"?"やや広め":"水泳選手のように広い",neck:"やや太め",chest:strength==="しっかり"?"筋肉質":"ほどよく厚い",abdomen:"薄く腹筋",waist:"やや細い",arms:strength==="控えめ"?"引き締まった":"筋肉質",thighs:"引き締まった",calves:"引き締まった",legs:"やや長め"});
 if(p==="ランナー体型")Object.assign(s,{bodyBuild:"ランナー体型",shoulder:"標準",chest:"標準",abdomen:"軽く引き締まる",waist:"細い",arms:"細い",thighs:"引き締まった",calves:"引き締まった",legs:"やや長め"});
 if(p==="がっしり体型")Object.assign(s,{bodyBuild:"がっしり",shoulder:strength==="控えめ"?"やや広め":"広い",neck:"やや太め",chest:strength==="しっかり"?"厚い":"ほどよく厚い",abdomen:"自然",waist:"標準",hip:"筋肉質",arms:strength==="控えめ"?"筋肉質":"太い",hands:"大きめ",thighs:strength==="控えめ"?"筋肉質":"太い",calves:"筋肉質"});
 if(p==="自転車競技者体型")Object.assign(s,{bodyBuild:"引き締まった",shoulder:"標準",chest:"標準",abdomen:"軽く引き締まる",waist:"やや細い",arms:"細い",thighs:strength==="控えめ"?"引き締まった":"筋肉質",calves:strength==="しっかり"?"筋肉質":"引き締まった",legs:"やや長め"});
 return s;
}
function showAssist(){
 savePageToState();
 $("assistStrength").value=state.assistStrength||"自然";
 $("assistAdjustWeight").value=state.assistAdjustWeight||"提案のみ";
 $("assistLockNonBody").value=state.assistLockNonBody||"固定する";
 const refresh=()=>{
   const s=calcAssist();
   $("assistSummary").innerHTML=Object.entries(s).map(([k,v])=>{const label=k==="weightSuggestion"?"推奨体重":k;const before=k==="weightSuggestion"?state.weight:(state[k]||"未設定");return `<div class="assist-item"><b>${label}</b>${before} → ${v}</div>`;}).join("");
   $("assistApply").onclick=()=>{
     state.assistStrength=$("assistStrength").value;state.assistAdjustWeight=$("assistAdjustWeight").value;state.assistLockNonBody=$("assistLockNonBody").value;
     const result=calcAssist();["weightSuggestion","bmiInfo","bmiComment","standardWeightGuide","strongWarning","bodyMismatch"].forEach(k=>delete result[k]);
     if($("changeMode").value==="only"){showToast("変更方式が『指定箇所だけ』のため、AIアシストは適用しませんでした。");$("assistModal").classList.remove("show");return;}
     Object.assign(state,result);$("assistModal").classList.remove("show");render();showToast("AIアシストの提案を適用しました。体型以外は固定しています。");
   };
 };
 ["assistStrength","assistAdjustWeight","assistLockNonBody"].forEach(id=>$(id).onchange=refresh);refresh();$("assistModal").classList.add("show");
}


function runConsistencyCheck(){
 savePageToState();
 const issues=[];
 const h=parseNumber(state.height,0),w=parseNumber(state.weight,0),bmi=bodyMassIndex(),assessment=bmiAssessment(bmi),range=suggestedWeightRange();
 const chest=parseNumber(state.chestCirc,0),waist=parseNumber(state.waistCirc,0);

 if(!h||!w)issues.push({type:"warn",text:"身長または体重を読み取れません。"});
 else if(assessment.level==="critical")issues.push({type:"warn",text:`身長${state.height}・体重${state.weight}はBMI約${bmi.toFixed(1)}で「${assessment.label}」です。意図的な設定か確認してください。一般的な目安は約${range.low}〜${range.high}kgです。`});
 else if(assessment.level==="warn")issues.push({type:"warn",text:`BMI約${bmi.toFixed(1)}で「${assessment.label}」です。体型設定との整合性を確認してください。`});
 else issues.push({type:"ok",text:`身長と体重：BMI約${bmi.toFixed(1)}で標準的な範囲です。`});
 if(["がっしり体型","細マッチョ","水泳選手体型"].includes(state.preset)&&bmi<18.5)issues.push({type:"warn",text:"選択した体型に対して体重が低く、見た目との整合性が取りにくい可能性があります。"});
 if(["細身","モデル体型","ランナー体型"].includes(state.preset)&&bmi>=28)issues.push({type:"warn",text:"選択した体型に対して体重が高く、見た目との整合性が取りにくい可能性があります。"});

 if(chest&&waist&&chest-waist>35)issues.push({type:"warn",text:"胸囲とウエストの差がかなり大きく、体型が極端に見える可能性があります。"});
 if(state.trailChestLink.includes("つながる")&&state.chestHair==="なし")issues.push({type:"warn",text:"Treasure Trailが胸毛へつながる設定ですが、胸毛は「なし」です。"});
 if(state.lowerHairArea.includes("内もも")&&state.innerThighHair==="なし")issues.push({type:"warn",text:"体毛の広がりは内もも上部までですが、内ももの毛は「なし」です。"});
 if(state.lowerHairArea.includes("鼠径部")&&state.groinHair==="なし")issues.push({type:"warn",text:"体毛の広がりは鼠径部までですが、鼠径部の毛は「なし」です。"});
 if(["濃い","非常に濃い"].includes(state.thighHair)&&["なし","ごく薄い"].includes(state.lowerThighHair))issues.push({type:"warn",text:"太もも上部は濃い設定ですが、太もも下部が非常に薄く、脚毛の連続性が弱くなる可能性があります。"});
 if(["濃い","非常に濃い"].includes(state.shinHair)&&["なし","ごく薄い"].includes(state.calfHair))issues.push({type:"warn",text:"すね毛は濃い設定ですが、ふくらはぎが非常に薄く、正面と背面で密度差が大きくなる可能性があります。"});
 if(state.armsPose==="両手を頭の後ろで組む"&&state.framingSafety==="見切れ防止を使用しない")issues.push({type:"warn",text:"両手を頭の後ろで組むポーズは横幅が広がるため、見切れ防止を推奨します。"});
 if(state.infoDisplay!=="表示しない"&&state.background==="透明")issues.push({type:"warn",text:"透明背景では、情報表示欄が不安定になる可能性があります。"});
 if(state.bottom==="ビキニ(ローライズ)"&&state.bottomRise.startsWith("ハイライズ"))issues.push({type:"warn",text:"ビキニ（ローライズ）にハイライズの股上が指定されています。"});
 if(state.bottom==="ビキニ(ハイレグ)"&&state.bottomLegOpening==="低い")issues.push({type:"warn",text:"ビキニ（ハイレグ）に低い脚ぐりが指定されています。"});
 if(state.bottom==="ボクサーパンツ(ローライズ)"&&!["自動","ローライズ：腰骨・骨盤付近"].includes(state.bottomRise))issues.push({type:"warn",text:"ボクサーパンツ（ローライズ）ですが、股上がローライズに設定されていません。"});
 if(state.top==="タンクトップ(インナー)"&&["クロップド丈","短め"].includes(state.topLength))issues.push({type:"warn",text:"タンクトップ（インナー）の丈が短いため、腹部が露出する可能性があります。"});
 if(state.bottomCoverage==="Tバック状"&&state.bottomBackShape==="全面")issues.push({type:"warn",text:"臀部の覆いは「Tバック状」ですが、背面形状は「全面」です。どちらを優先するか確認してください。"});
 if(state.bottomBackShape==="Tバック"&&state.bottomCoverage==="全面を覆う")issues.push({type:"warn",text:"背面形状は「Tバック」ですが、臀部の覆いは「全面を覆う」です。設定が矛盾しています。"});
 if(state.bottomFrontShape==="しっかり立体"&&state.bottomMaterial==="薄手布")issues.push({type:"warn",text:"立体的な前面形状に薄手布を組み合わせています。形状を安定させる場合は伸縮素材または厚みのある素材が適しています。"});
 if(["ふんどし(六尺)","ふんどし(黒猫)","締込み"].includes(state.bottom)&&state.bottomMaterial==="競泳水着素材")issues.push({type:"warn",text:"伝統的な巻き布衣装に競泳水着素材が指定されています。意図的な組み合わせか確認してください。"});
 if(!issues.length)issues.push({type:"ok",text:"大きな矛盾は見つかりませんでした。"});

 $("checkList").innerHTML=issues.map(x=>`<div class="checkitem ${x.type}">${x.text}</div>`).join("");
 $("checkModal").classList.add("show");
}

function bindGlobal(){
 $("settingLevel").addEventListener("change",()=>{state.settingLevel=$("settingLevel").value;render()});
 $("changeMode").addEventListener("change",()=>state.changeMode=$("changeMode").value);
 $("projectStatus").addEventListener("change",()=>state.projectStatus=$("projectStatus").value);
 $("newBtn").addEventListener("click",newProject);$("saveBtn").addEventListener("click",saveDraft);$("assistBtn").addEventListener("click",showAssist);$("assistClose").addEventListener("click",()=>$("assistModal").classList.remove("show"));$("checkBtn").addEventListener("click",runConsistencyCheck);$("checkClose").addEventListener("click",()=>$("checkModal").classList.remove("show"));
 $("libraryBtn").addEventListener("click",()=>{renderLibrary();$("libraryModal").classList.add("show")});
 $("libraryClose").addEventListener("click",()=>$("libraryModal").classList.remove("show"));
 $("jsonExportBtn").addEventListener("click",exportJSON);
 $("jsonFile").addEventListener("change",e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value=""});
}
bindGlobal();loadCurrent();render();
</script>
